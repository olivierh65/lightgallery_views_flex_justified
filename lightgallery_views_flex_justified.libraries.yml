    js/justified-gallery/album-justified-gallery.js: { }
    js/justified-gallery/jquery.justifiedGallery.min.js: { minified: true }
  css:
    theme:
      css/justified-gallery/justifiedGallery.min.css: { minified: true }
  dependencies:
    - core/once
    - core/drupal
    - core/jquery

flexbox:
