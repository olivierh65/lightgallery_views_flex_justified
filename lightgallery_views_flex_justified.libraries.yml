isotope:
  js:
    js/isotope.js: { }
  css:
    theme:
      css/isotope.css: { minified: false }
  dependencies:
    - core/once
    - core/drupal
    - core/jquery

justified-gallery:
  js:
    js/justified-gallery/album-justified-gallery.js: { }
    js/justified-gallery/jquery.justifiedGallery.min.js: { minified: true }
  css:
    theme:
      css/justified-gallery/justifiedGallery.min.css: { minified: true }
  dependencies:
    - core/once
    - core/drupal
    - core/jquery

flexbox:
  js:
    js/flexbox.js: { }
  css:
    theme:
      css/flexbox.css: { minified: false }

fancybox:
  version: 1.x
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css: { type: external }
      css/fancybox.css: {}
  js:
    https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js: { type: external }
    js/fancybox.js: {}
    js/image-throttle.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings

fancybox_grid:
  version: 1.x
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css: { type: external }
      css/fancybox_grid.css: {}
  js:
    https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js: { type: external }
    js/fancybox_grid.js: {}
    js/image-throttle.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings

# Nouvelle librairie pour le chargement progressif
album_gallery_progress:
  js:
    js/album-gallery-progress.js: {}
  css:
    component:
      css/album-gallery-progress.css: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/once
    - core/drupalSettings
    - core/drupal.dialog.ajax
    - core/drupal.ajax